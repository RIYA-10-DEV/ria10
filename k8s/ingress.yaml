apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: myingress
  labels:
    name: myingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec: 
  rules: 
  - host: home.com
    http: 
      paths: 
      - pathType: Prefix
        path: "/"
        backend:
         Service:
           name: my-svc-home
           port:
             number: 80
  - host: mobile.com
    http: 
      paths:
      - pathType: Prefix
        path: "/"
        backend:
         Service:
            name: my-svc-mobile
            port:
              number: 80  
